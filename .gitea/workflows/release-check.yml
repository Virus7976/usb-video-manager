name: Release check
# Backstop for `npm run release`. The installer is built and published LOCALLY
# (electron-builder --win needs Windows/wine, which this Linux runner doesn't
# have), so CI doesn't build — it validates that whatever got tagged is
# internally consistent and was actually published, catching a half-done or
# hand-rolled tag before anyone relies on it.
on:
  push:
    tags: ["v*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check the JS
        run: |
          node --check main.js
          node --check preload.js
          node --check src/renderer.js
          node --check watch-drives.js

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate config.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('config.json','utf8')); console.log('config.json OK')"

      - name: Tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

      - name: CHANGELOG has an entry for this version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          grep -q "^## \[$TAG\]" CHANGELOG.md || { echo "::error::no '## [$TAG]' section in CHANGELOG.md"; exit 1; }
          echo "CHANGELOG entry for $TAG found"

      - name: Auto-update publish feed is configured (GitHub)
        run: |
          node -e "const p=require('./package.json').build.publish; const g=Array.isArray(p)&&p.find(x=>x.provider==='github'); if(!g||!g.owner||!g.repo){console.error('build.publish must include a github provider with owner/repo');process.exit(1)} console.log('publish feed OK: github',g.owner+'/'+g.repo)"

      - name: Confirm the release was actually published to GitHub
        run: |
          TAG="$GITHUB_REF_NAME"
          REPO="$(node -p "const g=require('./package.json').build.publish.find(x=>x.provider==='github'); g.owner+'/'+g.repo")"
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          echo "github release $TAG -> HTTP $code"
          test "$code" = "200" || { echo "::error::release '$TAG' not found on github.com/$REPO — did 'npm run release' finish?"; exit 1; }
          echo "GitHub release $TAG exists."
